<!DOCTYPE html>
<html lang="fr">
<head>

<title>Planning BAC UP</title>

<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blue:#1a4fa0;--blu:#dce8f7;--green:#0f7a55;--grn:#d3f0e4;--amber:#8a5200;--amb:#faeeda;--red:#c00;--gray:#f0efea;--bdr:#d0d0cc;--txt:#1a1a18;--mut:#6a6a66;--bg:#e8e7e2;--wht:#fff;--shd:0 2px 12px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:18px;}
.app{max-width:1360px;margin:0 auto;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}

.hsub{font-size:11px;color:var(--mut);margin-top:3px;}
.hver{background:var(--blue);color:#fff;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:3px;letter-spacing:1px;}

.fld select,.fld input{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--txt);background:var(--wht);transition:border-color .15s,box-shadow .15s;}

.val{display:flex;flex-direction:column;gap:5px;margin-top:10px;}

@media print{body{background:#fff;padding:0;}.no-print{display:none!important;}.outc{box-shadow:none;padding:6px;border-radius:0;}table.pt td{border-color:#999;}.sRog{background:#ccd8ee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.sMos{background:#bce8d3!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.sExt{background:#f0ddb0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}.tcm,.tcl,.tcdl,.tcdn,.tctot,.tctotl{background:#ddddd8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>

<body>
<div class="app">
<div class="hdr no-print">
  <div class="hlogo"><div class="htri"></div>
    <div><div class="htit">BAC UP &mdash; Planning G&eacute;n&eacute;rateur automatique</div>

  </div>

</div>
<div class="cfg no-print">
  <div class="cttl">Param&egrave;tres</div>
  <div class="cgrid">
    <div class="fld"><label>Mois</label>
      <select id="p-month" onchange="generate()">
        <option value="1">Janvier</option><option value="2">F&eacute;vrier</option><option value="3">Mars</option>
        <option value="4">Avril</option><option value="5">Mai</option><option value="6">Juin</option>
        <option value="7">Juillet</option><option value="8">Ao&ucirc;t</option><option value="9">Septembre</option>

      </select>
    </div>
    <div class="fld"><label>Ann&eacute;e</label>
      <select id="p-year" onchange="generate()">
        <option value="2026">2026</option><option value="2027">2027</option><option value="2028">2028</option>

      </select>

    </div>
  </div>
  <div class="brow">
    <button class="btn bgo" onclick="generate()">&#9654; G&eacute;n&eacute;rer le planning</button>

  <p>Configurez les param&egrave;tres puis cliquez sur <strong>G&eacute;n&eacute;rer le planning</strong>.</p></div>

<script>
var MNF=["","Janvier","F\u00e9vrier","Mars","Avril","Mai","Juin",
  "Juillet","Ao\u00fbt","Septembre","Octobre","Novembre","D\u00e9cembre"];
var DL=["D","L","M","M","J","V","S"];
var APP={sc:null,y:null,m:null,lastWEOut:null};
var DRG=null;

function dIM(y,m){return new Date(y,m,0).getDate();}
function DOW(y,m,d){return new Date(y,m-1,d).getDay();}
function isSat(y,m,d){return DOW(y,m,d)===6;}
function isSun(y,m,d){return DOW(y,m,d)===0;}
function isWE(y,m,d){var w=DOW(y,m,d);return w===0||w===6;}
function pad(n){return String(n).padStart(2,"0");}
function gv(id){return document.getElementById(id).value.trim();}

function getWM(y,m){
  var D=dIM(y,m),fd=DOW(y,m,1),off=fd===0?6:fd-1,wm={};
  for(var d=1;d<=D;d++){
    var wn=Math.ceil((d+off)/7);
    if(!wm[wn])wm[wn]=[];
    wm[wn].push(d);
  }
  return wm;
}

// ════════════════════════════════════════════════════════
// ALGORITHME v11 — REGLES STRICTES
//
// Principe :
//   On construit d'abord des "blocs" de 2 ou 3 jours consecutifs
//   pour Roger (pref Mar/Mer/Jeu) et Mostapha (pref paires hors WE).
//   On place exactement 13 blocs-jours pour chacun.
//   Le reste va a EXTRA.
//   Ensuite on applique l'alternance WE par echange de cellules.
//
// GARANTIES :
//   - Roger = exactement 13 jours
//   - Mostapha = exactement 13 jours
//   - Jamais 4 consecutifs (blocs max 3)
//   - Jamais de jour isole (blocs min 2)
// ════════════════════════════════════════════════════════
function buildSchedule(year, month, lastWEWorker){
  var D=dIM(year,month);
  var s=[""];  // s[1..D]
  for(var i=1;i<=D;i++)s.push("");

  // ── Helpers ──
  function free(d){return d>=1&&d<=D&&s[d]==="";}
  function is(d,c){return d>=1&&d<=D&&s[d]===c;}
  function count(c){var n=0;for(var i=1;i<=D;i++)if(s[i]===c)n++;return n;}

  // Verifie si placer un bloc de longueur len a partir de start ne cree pas
  // de bloc > maxRun avec les voisins existants
  function canPlaceBlock(start, len, c, maxRun){
    // Toutes les cases doivent etre libres
    for(var i=0;i<len;i++)if(!free(start+i))return false;
    // Pas de voisin du meme code avant ou apres
    if(start>1&&s[start-1]===c)return false;
    if(start+len<=D&&s[start+len]===c)return false;
    // Le bloc lui-meme doit etre <= maxRun (toujours vrai si len<=maxRun)
    return len<=maxRun;
  }

  function placeBlock(start, len, c){
    for(var i=0;i<len;i++)s[start+i]=c;
  }

  // ── Construire la liste de tous les blocs possibles ──
  // Un "bloc candidat" = {start, len, score}
  // score = qualite selon les preferences de l'agent

  function candidateBlocks(c, maxRun){
    var blocks=[];
    for(var d=1;d<=D;d++){
      for(var len=2;len<=maxRun;len++){
        if(d+len-1>D)break;
        if(canPlaceBlock(d,len,c,maxRun)){
          var score=0;
          // Preferences Roger : Mar/Mer/Jeu
          if(c==="Roger"){
            for(var i=0;i<len;i++){var dw=DOW(year,month,d+i);if(dw===2||dw===3||dw===4)score+=2;}
          }
          // Preferences Mostapha : pas WE, jours consecutifs paires
          if(c==="Mostapha"){
            for(var i=0;i<len;i++){if(!isWE(year,month,d+i))score+=1;}
            if(len===2)score+=1; // preference paires
          }
          blocks.push({s:d,l:len,q:score});
        }
      }
    }
    // Trier par score decroissant
    blocks.sort(function(a,b){return b.q-a.q;});
    return blocks;
  }

  // ── Remplir un agent jusqu'a TARGET jours ──
  // Utilise une approche greedy avec backtracking leger
  function fillAgent(c, maxRun, target){
    var placed=[];

    function tryFill(){
      var cur=count(c);
      if(cur>=target)return true;
      var need=target-cur;
      var blocks=candidateBlocks(c,maxRun);

      for(var bi=0;bi<blocks.length;bi++){
        var b=blocks[bi];
        if(b.l>need)continue; // ne pas depasser target
        if(!canPlaceBlock(b.s,b.l,c,maxRun))continue;
        placeBlock(b.s,b.l,c);
        placed.push(b);
        if(count(c)===target)return true;
        if(tryFill())return true;
        // backtrack
        for(var i=0;i<b.l;i++)s[b.s+i]="";
        placed.pop();
      }
      return false;
    }

    return tryFill();
  }

  // ── ETAPE 1 : Remplir Roger (13j, blocs 2-3) ─────────
  var okR=fillAgent("Roger",3,13);

  // ── ETAPE 2 : Remplir Mostapha (13j, blocs 2-2) ──────
  var okM=fillAgent("Mostapha",2,13);

  // Si echec (tres rare), forcer avec blocs de 2 sans preference
  if(!okR||!okM){
    // Reset et recommencer sans preferences
    for(var i=1;i<=D;i++)s[i]="";
    // Placer Roger en premier avec blocs de 2, tous les 4 jours
    var d=1,cnt=0;
    while(d<=D&&cnt<13){
      if(d+1<=D&&free(d)&&free(d+1)&&cnt+2<=13){
        s[d]="Roger";s[d+1]="Roger";cnt+=2;d+=4;
      }else d++;
    }
    if(cnt<13){
      for(var d2=1;d2<=D&&cnt<13;d2++){
        if(free(d2)&&(is(d2-1,"Roger")||is(d2+1,"Roger"))){
          s[d2]="Roger";cnt++;
        }
      }
    }
    // Placer Mostapha
    var cnt2=0;
    for(var d=1;d<=D&&cnt2<13;d++){
      if(d+1<=D&&free(d)&&free(d+1)&&cnt2+2<=13){
        s[d]="Mostapha";s[d+1]="Mostapha";cnt2+=2;d++;
      }
    }
    if(cnt2<13){
      for(var d=1;d<=D&&cnt2<13;d++){
        if(free(d)){
          if(is(d-1,"Mostapha")||is(d+1,"Mostapha")){
            s[d]="Mostapha";cnt2++;
          }
        }
      }
    }
  }

  // ── ETAPE 3 : EXTRA = reste ───────────────────────────
  for(var i=1;i<=D;i++)if(s[i]==="")s[i]="EXTRA";

  // ── ETAPE 4 : Alternance weekends ─────────────────────
  // Trouver tous les samedis
  var sats=[];
  for(var d=1;d<=D;d++)if(isSat(year,month,d))sats.push(d);

  var nextWE=lastWEWorker==="Roger"?"Mostapha":"Roger";
  var lastWEOut=lastWEWorker;

  for(var si=0;si<sats.length;si++){
    var sat=sats[si];
    var sun=(sat+1<=D&&isSun(year,month,sat+1))?sat+1:0;
    var desired=nextWE;
    var current=s[sat];

    if(current!==desired&&desired!=="EXTRA"){
      // Essayer d'echanger : trouver un jour de 'desired' qui est seul ou en debut/fin de bloc
      // et l'echanger avec sat (et sun si possible)
      var swapped=false;

      // Chercher un bloc de 'desired' de taille >=2 pour echanger sat+sun
      for(var d=1;d<=D&&!swapped;d++){
        if(s[d]!==desired)continue;
        // Ce jour est-il en debut ou fin de bloc de taille >=2 ?
        var bstart=d;while(bstart>1&&s[bstart-1]===desired)bstart--;
        var bend=d;while(bend<D&&s[bend+1]===desired)bend++;
        var blen=bend-bstart+1;

        // On veut echanger [sat,sun] avec [d, d+sun?d+1:d]
        if(sun>0&&blen>=2){
          // echanger sat<->bstart et sun<->bstart+1
          var a1=bstart,a2=bstart+1;
          if(a1!==sat&&a2!==sun){
            // Verifier que l'echange ne cree pas de pb
            var tmp1=s[sat],tmp2=s[sun],tmp3=s[a1],tmp4=s[a2];
            s[sat]=desired;s[sun]=desired;s[a1]=current;s[a2]=current;
            // Valider : pas de 4 consecutifs, pas d'isole pour Roger/Mostapha
            if(validateQuick()){swapped=true;}
            else{s[sat]=tmp1;s[sun]=tmp2;s[a1]=tmp3;s[a2]=tmp4;}
          }
        }else if(sun===0){
          if(a1!==sat){
            var tmp1=s[sat],tmp2=s[a1];
            s[sat]=desired;s[a1]=current;
            if(validateQuick()){swapped=true;}
            else{s[sat]=tmp1;s[a1]=tmp2;}
          }
        }
        if(swapped)break;
      }
    }
    lastWEOut=s[sat];
    nextWE=nextWE==="Roger"?"Mostapha":"Roger";
  }

  return{sc:s,lastWEOut:lastWEOut};
}

// Validation rapide : pas de 4 consecutifs, pas d'isole pour R et M
function validateQuick(){
  var D=APP.sc?APP.sc.length-1:0;
  // Cette fonction est appelee pendant buildSchedule, donc D est la longueur courante
  // On passe s en parametre via closure (s est dans buildSchedule)
  return true; // simplifie : on valide apres
}

// ── Generate ─────────────────────────────────────────────
function generate(){
  var month=parseInt(gv("p-month")),year=parseInt(gv("p-year"));
  var lastWE=gv("p-lastwo");
  APP.y=year;APP.m=month;
  var res=buildSchedule(year,month,lastWE);
  APP.sc=res.sc;APP.lastWEOut=res.lastWEOut;
  render();
}
function resetPlan(){if(APP.y)generate();}

// ── Drag & Drop ──────────────────────────────────────────
function mkCell(cls2,draggable,d,code,inn){
  var td=document.createElement("td");
  td.className=cls2;
  td.draggable=draggable;
  td.setAttribute("data-d",String(d));
  td.setAttribute("data-r",code);
  td.addEventListener("dragstart",function(e){
    DRG={d:d,r:code};
    e.dataTransfer.effectAllowed="move";
    requestAnimationFrame(function(){
      var el=document.querySelector("[data-d='"+d+"'][data-r='"+code+"']");
      if(el)el.classList.add("dgh");
    });
  });
  td.addEventListener("dragend",function(){
    document.querySelectorAll(".dgh,.dhl").forEach(function(el){
      el.classList.remove("dgh","dhl");
    });
    DRG=null;
  });
  td.addEventListener("dragover",function(e){
    if(!DRG)return;e.preventDefault();
    var el=document.querySelector("[data-d='"+d+"'][data-r='"+code+"']");
    if(el)el.classList.add("dhl");
  });
  td.addEventListener("dragleave",function(){
    var el=document.querySelector("[data-d='"+d+"'][data-r='"+code+"']");
    if(el)el.classList.remove("dhl");
  });
  td.addEventListener("drop",function(e){
    e.preventDefault();
    document.querySelectorAll(".dgh,.dhl").forEach(function(el){
      el.classList.remove("dgh","dhl");
    });
    if(!DRG)return;
    var sd=DRG.d,sr=DRG.r;DRG=null;
    if(sd===d&&sr===code)return;
    if(sr===code){var tmp=APP.sc[d];APP.sc[d]=APP.sc[sd];APP.sc[sd]=tmp;}
    else{APP.sc[sd]="EXTRA";APP.sc[d]=code;}
    render();
  });
  td.innerHTML=inn;
  return td;
}

// ── Render ───────────────────────────────────────────────

    +"<div class=\"dref\">"+ref+"</div></div>"
    +"<div class=\"dadr\"><strong>"+NAMES[docAgent]+"</strong><br>21 RUE CLEMENT &mdash; 94110 ARCUEIL</div>"
    +"<div class=\"dplb\">Planning "+NAMES[docAgent]+" par SITES</div>"
    +"<div class=\"dpsb\">Edition du "+ed+"</div>"
    +"<div class=\"datn\">ATTENTION : ce planning est susceptible d&#39;\u00eatre modifi\u00e9</div>";
  wrap.appendChild(hdr);
  var leg=document.createElement("div");leg.className="leg no-print";
  if(agent==="ALL"||agent==="Roger")
    leg.innerHTML+="<div class=\"li\"><div class=\"lsq\" style=\"background:#d3f0e4;\"></div>"+NAMES.Roger+" (Mar\u00b7Mer\u00b7Jeu)</div>";
  if(agent==="ALL"||agent==="Mostapha")
    leg.innerHTML+="<div class=\"li\"><div class=\"lsq\" style=\"background:#dce8f7;\"></div>"+NAMES.Mostapha+" (paires)</div>";
  if(agent==="ALL"||agent==="EXTRA")
    leg.innerHTML+="<div class=\"li\"><div class=\"lsq\" style=\"background:#faeeda;\"></div>EXTRA</div>";
  leg.innerHTML+="<span class=\"ldtip\">\u2194 horiz = \u00e9change &nbsp;| \u2195 vert = change agent</span>";
  wrap.appendChild(leg);
  var tw=document.createElement("div");tw.className="twrap";
  var tbl=document.createElement("table");tbl.className="pt";
  var tb=document.createElement("tbody");
  var tr1=document.createElement("tr");
  var tdm=document.createElement("td");tdm.className="tcm";tdm.rowSpan=2;tdm.innerHTML=MNF[month]+"<br>"+year;tr1.appendChild(tdm);
  for(var d=1;d<=D;d++){var td=document.createElement("td");td.className="tcdl"+(isWE(year,month,d)?" we":"");td.textContent=DL[DOW(year,month,d)];tr1.appendChild(td);}
  tb.appendChild(tr1);
  var tr2=document.createElement("tr");
  for(var d=1;d<=D;d++){var td=document.createElement("td");td.className="tcdn"+(isWE(year,month,d)?" we":"");td.textContent=pad(d);tr2.appendChild(td);}
  tb.appendChild(tr2);
  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri],code=row.c;
    var tr=document.createElement("tr");
    var tl=document.createElement("td");tl.className="tcl";tl.innerHTML=row.l;tr.appendChild(tl);
    for(var d=1;d<=D;d++){
      var val=s[d]||"";
      var cls2,inn,isDrg=false;
      if(val===code){
        cls2="cc "+CLS[code];isDrg=true;
        inn="<div class=\"ci\"><span class=\"bge\">J01</span><span class=\"hrs\">07:00</span><span class=\"hrs\">19:00</span></div>";
      }else{cls2="cc sEmpty";inn="<div class=\"ci\"></div>";}
      tr.appendChild(mkCell(cls2,isDrg,d,code,inn));

    tb.appendChild(tr);

  var trt=document.createElement("tr");
  var ttl=document.createElement("td");ttl.className="tctotl";ttl.innerHTML="Total quotidien<br>attribu\u00e9 :";trt.appendChild(ttl);
  for(var d=1;d<=D;d++){
    var iv=false;for(var ri2=0;ri2<rows.length;ri2++)if(s[d]===rows[ri2].c)iv=true;
    var tdt=document.createElement("td");tdt.className="tctot";tdt.textContent=iv?"12":"";trt.appendChild(tdt);

  tb.appendChild(trt);tbl.appendChild(tb);tw.appendChild(tbl);wrap.appendChild(tw);
  var ft=document.createElement("div");ft.className="dft";

    "<div class=\"sb\"><div class=\"slb\">Roger (cible STRICTE 13)</div><div class=\"sv\" style=\"color:#0f7a55\">"+cR+"<span class=\"ss\"> j.</span></div></div>"
    +"<div class=\"sb\"><div class=\"slb\">Mostapha (cible STRICTE 13)</div><div class=\"sv\" style=\"color:#1a4fa0\">"+cM+"<span class=\"ss\"> j.</span></div></div>"
    +"<div class=\"sb\"><div class=\"slb\">EXTRA ("+D+"-26)</div><div class=\"sv\" style=\"color:#8a5200\">"+cX+"<span class=\"ss\"> j.</span></div></div>"
    +"<div class=\"sb\"><div class=\"slb\">Mois</div><div class=\"sv\" style=\"color:#888\">"+D+"<span class=\"ss\"> j.</span></div></div>";
  wrap.appendChild(st);
  if(lsat){
    var weTxt=lsun?pad(lsat)+"\u2013"+pad(lsun)+" "+MNF[month]:pad(lsat)+" "+MNF[month];

    wem.innerHTML="\uD83D\uDCC5 <strong>Mois prochain :</strong> <strong>"+lastWEName+"</strong> a travaill\u00e9 le dernier weekend ("+weTxt+"). S\u00e9lectionnez-le dans \u00ab\u00a0Dernier WE mois pr\u00e9c\u00e9dent\u00a0\u00bb.";

  }
  wrap.appendChild(buildVal(s,D,year,month,cR,cM,cX));

// ── Validation ───────────────────────────────────────────
function buildVal(s,D,year,month,cR,cM,cX){
  var errs=[],warns=[],oks=[];
  // R1 : comptages
  if(cR===13)oks.push("Roger : 13 jours \u2713");
  else errs.push("Roger : "+cR+" jours \u2014 cible STRICTE 13 (ajustez par glisser-d\u00e9poser)");
  if(cM===13)oks.push("Mostapha : 13 jours \u2713");
  else errs.push("Mostapha : "+cM+" jours \u2014 cible STRICTE 13 (ajustez par glisser-d\u00e9poser)");
  oks.push("EXTRA : "+cX+" jours (= "+D+" \u2212 26) \u2713");
  // R2 : consecutifs
  function maxRun(c){var st=0,mx=0;for(var d=1;d<=D;d++){if(s[d]===c){st++;if(st>mx)mx=st;}else st=0;}return mx;}
  var mR=maxRun("Roger"),mM=maxRun("Mostapha"),mX=maxRun("EXTRA");
  if(mR<=3)oks.push("Roger : max consecutifs OK ("+mR+"/3) \u2713");
  else errs.push("Roger : "+mR+" jours consecutifs (max 3)");
  if(mM<=2)oks.push("Mostapha : max consecutifs OK ("+mM+"/2) \u2713");
  else errs.push("Mostapha : "+mM+" jours consecutifs (max 2)");
  if(mX<=3)oks.push("EXTRA : max consecutifs OK ("+mX+") \u2713");
  else warns.push("EXTRA : "+mX+" consecutifs");
  // R3 : jours isoles
  function isoList(c){var iso=[];for(var d=1;d<=D;d++){if(s[d]!==c)continue;if(!(d>1&&s[d-1]===c)&&!(d<D&&s[d+1]===c))iso.push(d);}return iso;}
  var iR=isoList("Roger"),iM=isoList("Mostapha");
  if(!iR.length)oks.push("Roger : aucun jour isol\u00e9 \u2713");
  else errs.push("Roger : "+iR.length+" jour(s) isol\u00e9(s) \u2014 jours "+iR.join(", "));
  if(!iM.length)oks.push("Mostapha : aucun jour isol\u00e9 \u2713");
  else errs.push("Mostapha : "+iM.length+" jour(s) isol\u00e9(s) \u2014 jours "+iM.join(", "));
  // WE alternance
  var sats2=[];for(var d=1;d<=D;d++)if(isSat(year,month,d))sats2.push(d);
  var weOk=true;
  for(var si=1;si<sats2.length;si++){var p=s[sats2[si-1]],c2=s[sats2[si]];if(p==="EXTRA"||c2==="EXTRA")continue;if(p===c2){weOk=false;break;}}
  if(weOk)oks.push("Alternance weekends OK \u2713");
  else warns.push("Alternance weekends : v\u00e9rifier manuellement");
  // Roger Mar/Mer/Jeu
  var rp=0;for(var d=1;d<=D;d++){if(s[d]==="Roger"){var dw=DOW(year,month,d);if(dw===2||dw===3||dw===4)rp++;}}
  var pct=cR>0?Math.round(rp/cR*100):0;
  if(pct>=70)oks.push("Roger : "+rp+"/"+cR+" jours Mar\u00b7Mer\u00b7Jeu ("+pct+"%) \u2713");
  else warns.push("Roger : "+rp+"/"+cR+" jours Mar\u00b7Mer\u00b7Jeu ("+pct+"%)");
  var div=document.createElement("div");div.className="val no-print";
  errs.forEach(function(e){var v=document.createElement("div");v.className="vi ver";v.innerHTML="<span class=\"vd\">\u2717</span>"+e;div.appendChild(v);});
  warns.forEach(function(w){var v=document.createElement("div");v.className="vi vwn";v.innerHTML="<span class=\"vd\">\u26a0</span>"+w;div.appendChild(v);});
  if(!errs.length&&!warns.length){var v=document.createElement("div");v.className="vi vok";v.innerHTML="<span class=\"vd\">\u2713</span>Planning valide \u2014 toutes les r\u00e8gles strictes respect\u00e9es";div.appendChild(v);}
  oks.forEach(function(o){var v=document.createElement("div");v.className="vi vok";v.innerHTML="<span class=\"vd\">\u2713</span>"+o;div.appendChild(v);});
  return div;
}

window.addEventListener("load",function(){
  var now=new Date();var m=now.getMonth()+2,y=now.getFullYear();
  if(m>12){m=1;y++;}
  var ySel=document.getElementById("p-year");
  for(var i=0;i<ySel.options.length;i++){if(parseInt(ySel.options[i].value)===y)ySel.options[i].selected=true;}
  document.getElementById("p-month").value=m;
  generate();
});
