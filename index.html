<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning BAC UP — Générateur automatique</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1a4fa0;--blue-lt:#dce8f7;--blue-dk:#0d3270;
  --green:#0f7a55;--green-lt:#d3f0e4;
  --amber:#8a5200;--amber-lt:#faeeda;
  --red:#c00;--gray:#f0efea;--border:#d0d0cc;
  --text:#1a1a18;--muted:#6a6a66;--bg:#e8e7e2;--white:#fff;
  --shadow:0 2px 12px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:18px;}
.app{max-width:1360px;margin:0 auto;}

/* ── HEADER ── */
.app-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;padding:0 2px;}
.app-logo{display:flex;align-items:center;gap:10px;}
.app-tri{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:24px solid var(--blue);}
.app-title{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;letter-spacing:1px;color:var(--text);}
.app-title span{color:var(--blue);}
.app-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.app-ver{background:var(--blue);color:#fff;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:3px;letter-spacing:1px;margin-top:2px;}

/* ── CONFIG PANEL ── */
.cfg{background:var(--white);border-radius:10px;box-shadow:var(--shadow);padding:18px 22px;margin-bottom:14px;}
.cfg-ttl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.cfg-ttl::after{content:'';flex:1;height:1px;background:var(--border);}
.cfg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.fld label{display:block;font-size:9.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.fld select,.fld input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--text);background:var(--white);transition:border-color .15s,box-shadow .15s;}
.fld select:focus,.fld input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,79,160,.1);}
.fld .note{font-size:9px;color:var(--muted);margin-top:4px;line-height:1.4;}
.fld select[id="sel-agent"]{font-weight:600;color:var(--blue);}
.fld input[readonly]{background:var(--gray);color:var(--muted);cursor:not-allowed;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'IBM Plex Sans',sans-serif;transition:opacity .15s,transform .1s;}
.btn:hover{opacity:.84;}.btn:active{transform:scale(.97);}
.btn-go{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(26,79,160,.28);}
.btn-print{background:#1a1a18;color:#fff;}
.btn-rst{background:var(--gray);color:var(--text);border:1px solid var(--border);}
.btn-div{width:1px;height:28px;background:var(--border);margin:0 2px;}

/* ── OUTPUT CARD ── */
.out-card{background:var(--white);border-radius:10px;box-shadow:var(--shadow);padding:22px;}
.ph{text-align:center;padding:70px 20px;color:var(--muted);}
.ph-ico{font-size:36px;margin-bottom:12px;}
.ph h3{font-size:16px;font-weight:500;margin-bottom:5px;}
.ph p{font-size:13px;}

/* ── BAC UP DOCUMENT ── */
.bup-doc{}
.bup-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.bup-logo-wrap{display:flex;align-items:center;gap:10px;}
.doc-tri{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:20px solid var(--blue);}
.doc-wm{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;letter-spacing:3px;color:var(--text);}
.doc-wm span{color:var(--blue);}
.doc-ref{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);font-weight:600;}
.doc-addr{font-size:11.5px;line-height:1.75;color:#444;margin-bottom:5px;}
.doc-addr strong{color:var(--text);font-weight:600;}
.doc-plbl{font-size:11px;font-weight:700;color:var(--text);}
.doc-psub{font-size:10.5px;color:var(--muted);margin-bottom:5px;}
.doc-attn{font-size:10.5px;color:var(--amber);font-style:italic;margin-bottom:12px;}

/* ── LEGEND (screen only) ── */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-sq{width:11px;height:11px;border-radius:2px;border:1px solid rgba(0,0,0,.12);flex-shrink:0;}
.leg-drag{font-size:10px;color:var(--muted);font-style:italic;margin-left:auto;background:var(--gray);padding:4px 8px;border-radius:4px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;}
table.pt{border-collapse:collapse;min-width:840px;width:100%;font-size:9.5px;}
table.pt th,table.pt td{border:.5px solid #bbb;text-align:center;padding:0;}
.cm{background:#e0e0da;font-weight:700;font-size:12px;padding:5px 7px;text-align:center;min-width:72px;width:72px;line-height:1.5;}
.cl{background:#e0e0da;font-size:8.5px;font-weight:600;color:#444;text-align:left;padding:2px 5px;min-width:82px;width:82px;white-space:nowrap;vertical-align:middle;line-height:1.4;}
.cdl{background:#e0e0da;font-size:8.5px;font-weight:700;color:#555;padding:2px 0;min-width:19px;width:19px;}
.cdl.we{color:var(--red);}
.cdn{background:#e0e0da;font-size:9.5px;font-weight:700;color:var(--text);padding:2px 0;}
.cdn.we{color:var(--red);}

/* Work cells */
.cc{position:relative;transition:filter .12s;}
.cc[draggable="true"]{cursor:grab;}
.cc[draggable="true"]:active{cursor:grabbing;}
.cc.drop-hl{outline:2px dashed var(--blue);outline-offset:-2px;filter:brightness(.92);}
.cc.drag-ghost{opacity:.35;}
.ci{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:30px;padding:1px;line-height:1.2;user-select:none;}
.ci .badge{font-size:7.5px;font-weight:700;}
.ci .hrs{font-size:6.5px;}

.sA{background:var(--blue-lt);}
.sA .badge{color:#1a4fa0;}.sA .hrs{color:#1a4fa0;}
.sB{background:var(--green-lt);}
.sB .badge{color:var(--green);}.sB .hrs{color:var(--green);}
.sX{background:var(--amber-lt);}
.sX .badge{color:var(--amber);}.sX .hrs{color:var(--amber);}
.sR{background:#fff;}
.sRB{background:#eaeae4;}
.sRB .ci span{font-size:6px;color:#aaa;}

.ctot{background:#e0e0da;font-size:8.5px;font-weight:700;color:var(--text);padding:2px 0;}
.ctotl{background:#e0e0da;text-align:left!important;padding:2px 5px!important;font-size:8.5px;color:#555;line-height:1.4;}

/* ── DOC FOOTER ── */
.doc-ft{margin-top:9px;font-size:9px;color:#888;border-top:.5px solid #ccc;padding-top:6px;line-height:1.6;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.sbox{background:var(--gray);border-radius:7px;padding:9px 12px;}
.slbl{font-size:9.5px;color:var(--muted);margin-bottom:3px;font-weight:500;}
.sval{font-size:17px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.ssub{font-size:10px;color:var(--muted);font-weight:400;}

/* ── VALIDATION ── */
.val{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.vi{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;padding:6px 12px;border-radius:6px;}
.vok{background:var(--green-lt);color:var(--green);}
.vwn{background:var(--amber-lt);color:var(--amber);}
.ver{background:#fce8e8;color:#a32d2d;}
.vd{font-size:12px;flex-shrink:0;margin-top:1px;}

/* ── PRINT ── */
@media print{
  body{background:#fff;padding:0;}
  .no-print{display:none!important;}
  .out-card{box-shadow:none;padding:6px;border-radius:0;}
  .cc{cursor:default;}
  table.pt th,table.pt td{border-color:#999;}
  .sA{background:#ccd8ee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sB{background:#bce8d3!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sX{background:#f0ddb0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sRB{background:#ddddd8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .cm,.cl,.cdl,.cdn,.ctot,.ctotl{background:#ddddd8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>
<div class="app">

  <!-- ═══ APP HEADER ═══ -->
  <div class="app-hdr no-print">
    <div class="app-logo">
      <div class="app-tri"></div>
      <div>
        <div class="app-title">BAC <span>UP</span> — Planning Générateur automatique</div>
        <div class="app-sub">SSIAP 1 &nbsp;·&nbsp; Vacation J01 &nbsp;·&nbsp; 07h00 – 19h00 (12h)</div>
      </div>
    </div>
    <div class="app-ver">v3.0</div>
  </div>

  <!-- ═══ CONFIG ═══ -->
  <div class="cfg no-print">
    <div class="cfg-ttl">Paramètres</div>
    <div class="cfg-grid">

      <div class="fld">
        <label>Mois</label>
        <select id="sel-month">
          <option value="1">Janvier</option><option value="2">Février</option>
          <option value="3">Mars</option><option value="4">Avril</option>
          <option value="5">Mai</option><option value="6">Juin</option>
          <option value="7">Juillet</option><option value="8">Août</option>
          <option value="9">Septembre</option><option value="10">Octobre</option>
          <option value="11">Novembre</option><option value="12">Décembre</option>
        </select>
      </div>

      <div class="fld">
        <label>Année</label>
        <select id="sel-year">
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
          <option value="2029">2029</option>
          <option value="2030">2030</option>
        </select>
      </div>

      <div class="fld">
        <label>Agent</label>
        <select id="sel-agent">
          <option value="ALL">TOUS — Complet</option>
          <option value="A">Mostapha LAHOUAOUI</option>
          <option value="B">Roger DE SOUZA</option>
          <option value="X">Agent EXTRA</option>
        </select>
        <div class="note">Filtre le planning affiché</div>
      </div>

      <div class="fld">
        <label>Nom du site</label>
        <input type="text" id="site-name" value="RENAISSANCE PARIS NOBEL TOUR EIFFEL" readonly>
        <div class="note">Valeur fixe du site</div>
      </div>

      <div class="fld">
        <label>Réf. document</label>
        <input type="text" id="ref-num" value="1504">
      </div>

      <div class="fld">
        <label>Congé Mostapha (semaine)</label>
        <select id="rest-week">
          <option value="2">Semaine 2 du mois</option>
          <option value="3" selected>Semaine 3 du mois</option>
          <option value="4">Semaine 4 du mois</option>
        </select>
        <div class="note">Semaine sans vacation pour Mostapha</div>
      </div>

    </div>
    <div class="btn-row">
      <button class="btn btn-go" onclick="generate()">▶ Générer le planning</button>
      <div class="btn-div"></div>
      <button class="btn btn-print" onclick="window.print()">🖨 Imprimer / PDF</button>
      <button class="btn btn-rst" onclick="resetPlan()">↺ Réinitialiser</button>
    </div>
  </div>

  <!-- ═══ OUTPUT ═══ -->
  <div class="out-card" id="out">
    <div class="ph">
      <div class="ph-ico">📋</div>
      <h3>Aucun planning généré</h3>
      <p>Configurez les paramètres puis cliquez sur <strong>Générer le planning</strong>.</p>
    </div>
  </div>

</div><!-- /app -->

<script>
/* ═══════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════ */
const MONTHS=['','Janvier','Février','Mars','Avril','Mai','Juin',
  'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DL=['D','L','M','M','J','V','S'];

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
const APP={sched:null,year:null,month:null,restWeek:null,wm:null};
let DRAG=null; // {day, rowCode}

/* ═══════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════ */
const dim=(y,m)=>new Date(y,m,0).getDate();
const dow=(y,m,d)=>new Date(y,m-1,d).getDay(); // 0=Sun
const isWE=(y,m,d)=>{const w=dow(y,m,d);return w===0||w===6;};
const pad=n=>String(n).padStart(2,'0');
const v=id=>document.getElementById(id).value.trim();

function buildWeekMap(y,m){
  const D=dim(y,m);
  const fd=dow(y,m,1);
  const fdOff=fd===0?6:fd-1; // days before Monday of week containing day 1
  const wm={};
  for(let d=1;d<=D;d++){
    const wn=Math.ceil((d+fdOff)/7);
    if(!wm[wn])wm[wn]=[];
    wm[wn].push(d);
  }
  return wm;
}

function getWkNum(y,m,d){
  const fd=dow(y,m,1);
  const fdOff=fd===0?6:fd-1;
  return Math.ceil((d+fdOff)/7);
}

/* ═══════════════════════════════════════════════════════
   ALGORITHM
═══════════════════════════════════════════════════════ */
function buildSchedule(year,month,restWeek){
  const D=dim(year,month);
  const s=new Array(D+1).fill('');
  const wm=buildWeekMap(year,month);
  const restDays=new Set(wm[restWeek]||[]);

  /* ── ROGER (B): groupe Mardi/Mercredi/Jeudi par semaine ── */
  const rogByWk={};
  for(let d=1;d<=D;d++){
    const dw=dow(year,month,d);
    if(dw===2||dw===3||dw===4){
      const wn=getWkNum(year,month,d);
      if(!rogByWk[wn])rogByWk[wn]=[];
      rogByWk[wn].push(d);
    }
  }
  // Sélection des groupes complets en priorité (évite les jours isolés)
  const rogDays=[];
  const wkNums=Object.keys(rogByWk).map(Number).sort((a,b)=>a-b);
  for(const wn of wkNums){
    const grp=rogByWk[wn];
    if(rogDays.length+grp.length<=13){
      rogDays.push(...grp);
    }else{
      const need=13-rogDays.length;
      if(need>0){
        // Prendre depuis le début du groupe (Mardi+Mercredi = pair)
        rogDays.push(...grp.slice(0,need));
      }
      break;
    }
  }
  for(const d of rogDays)s[d]='B';

  /* ── MOSTAPHA (A): paires sur jours disponibles, hors congé ── */
  // Jours disponibles (ni Roger, ni congé)
  const avail=[];
  for(let d=1;d<=D;d++){
    if(s[d]===''&&!restDays.has(d))avail.push(d);
  }

  let aCount=0,i=0;
  // Passe 1 : recherche de paires consécutives (avec gap de 1 jour entre paires)
  while(i<avail.length&&aCount<13){
    const d=avail[i];
    if(i+1<avail.length&&avail[i+1]===d+1&&aCount+2<=13){
      s[d]='A';s[d+1]='A';
      aCount+=2;i+=2;
      // Sauter le gap d'au moins 1 jour pour éviter 3 consécutifs
      while(i<avail.length&&avail[i]<=d+2)i++;
    }else{
      i++;
    }
  }
  // Passe 2 (fallback): jours seuls si manque encore
  if(aCount<13){
    for(let d=1;d<=D&&aCount<13;d++){
      if(s[d]===''&&!restDays.has(d)){s[d]='A';aCount++;}
    }
  }

  /* ── EXTRA (X): tout le reste ── */
  for(let d=1;d<=D;d++){if(s[d]===''||restDays.has(d)&&s[d]==='')s[d]=s[d]||'X';}
  // Marquer les jours de congé Mostapha non assignés comme X
  for(let d=1;d<=D;d++){if(s[d]==='')s[d]='X';}

  return s;
}

/* ═══════════════════════════════════════════════════════
   GENERATE
═══════════════════════════════════════════════════════ */
function generate(){
  const month=parseInt(v('sel-month'));
  const year=parseInt(v('sel-year'));
  const restWeek=parseInt(v('rest-week'));
  APP.sched=buildSchedule(year,month,restWeek);
  APP.year=year;APP.month=month;APP.restWeek=restWeek;
  APP.wm=buildWeekMap(year,month);
  render();
}

function resetPlan(){if(APP.year)generate();}

/* ═══════════════════════════════════════════════════════
   DRAG & DROP HANDLERS
═══════════════════════════════════════════════════════ */
function onDragStart(e,day,rowCode){
  DRAG={day,rowCode};
  e.dataTransfer.effectAllowed='move';
  // Légère transparence sur la source
  requestAnimationFrame(()=>{
    const el=document.querySelector(`[data-day="${day}"][data-row="${rowCode}"]`);
    if(el)el.classList.add('drag-ghost');
  });
}

function onDragEnd(e){
  document.querySelectorAll('.drag-ghost').forEach(el=>el.classList.remove('drag-ghost'));
  document.querySelectorAll('.drop-hl').forEach(el=>el.classList.remove('drop-hl'));
  DRAG=null;
}

function onDragOver(e,day,rowCode){
  if(!DRAG)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const el=document.querySelector(`[data-day="${day}"][data-row="${rowCode}"]`);
  if(el)el.classList.add('drop-hl');
}

function onDragLeave(e,day,rowCode){
  const el=document.querySelector(`[data-day="${day}"][data-row="${rowCode}"]`);
  if(el)el.classList.remove('drop-hl');
}

function onDrop(e,targetDay,targetRowCode){
  e.preventDefault();
  document.querySelectorAll('.drop-hl').forEach(el=>el.classList.remove('drop-hl'));
  document.querySelectorAll('.drag-ghost').forEach(el=>el.classList.remove('drag-ghost'));
  if(!DRAG)return;

  const{day:srcDay,rowCode:srcRow}=DRAG;
  DRAG=null;

  if(srcDay===targetDay&&srcRow===targetRowCode)return; // même cellule

  const srcVal=APP.sched[srcDay];

  if(srcRow===targetRowCode){
    /* ── DÉPLACEMENT HORIZONTAL : même ligne → la cellule garde sa couleur ──
       On échange les valeurs entre srcDay et targetDay (le travail se déplace
       mais reste affecté au même agent = couleur inchangée) */
    const tgtVal=APP.sched[targetDay];
    APP.sched[srcDay]=tgtVal;   // la source prend la valeur de la cible
    APP.sched[targetDay]=srcVal; // la cible prend la valeur de la source
  }else{
    /* ── DÉPLACEMENT VERTICAL : ligne différente → la cellule prend la couleur
       de la ligne de destination ──
       La source est vidée, la cible prend le code de la ligne destination */
    APP.sched[srcDay]=''; // vider la source
    APP.sched[targetDay]=targetRowCode; // cible = couleur de la ligne de destination
    // Les jours vides seront affichés comme non couverts
  }

  render();
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function render(){
  const{sched:s,year,month,restWeek,wm}=APP;
  const D=dim(year,month);
  const agent=v('sel-agent'); // 'ALL','A','B','X'
  const siteName=v('site-name')||'RENAISSANCE PARIS NOBEL TOUR EIFFEL';
  const refNum=v('ref-num')||'1504';
  const restDays=new Set(wm[restWeek]||[]);

  // Noms
  const names={A:'LAHOUAOUI Mostapha',B:'DE SOUZA Roger',X:'AGENT EXTRA'};
  const short={A:'LAHOUAOUI',B:'DE SOUZA',X:'EXTRA'};
  const colors={A:'sA',B:'sB',X:'sX'};
  const textColors={A:'#1a4fa0',B:'#0f7a55',X:'#8a5200'};

  // Titre document
  const docName=agent==='A'?names.A:agent==='B'?names.B:agent==='X'?names.X:names.A;

  // Timestamp
  const now=new Date();
  const ed=`${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} à ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  // Lignes à afficher
  const rows=[];
  if(agent==='ALL'||agent==='A')rows.push({code:'A',lbl:`${siteName}<br><span style="color:${textColors.A};font-weight:700;">${short.A} M.</span>`});
  if(agent==='ALL'||agent==='B')rows.push({code:'B',lbl:`${siteName}<br><span style="color:${textColors.B};font-weight:700;">${short.B} R.</span>`});
  if(agent==='ALL'||agent==='X')rows.push({code:'X',lbl:`${siteName}<br><span style="color:${textColors.X};font-weight:700;">EXTRA</span>`});

  // Compteurs
  const cnt={A:0,B:0,X:0};
  s.slice(1).forEach(v=>{if(v&&cnt[v]!==undefined)cnt[v]++;});

  let h=`<div class="bup-doc">`;

  /* ── En-tête document ── */
  h+=`<div class="bup-top">
    <div class="bup-logo-wrap">
      <div class="doc-tri"></div>
      <div class="doc-wm">BAC <span>UP</span></div>
    </div>
    <div class="doc-ref">${refNum}</div>
  </div>
  <div class="doc-addr"><strong>${docName}</strong><br>21 RUE CLEMENT &mdash; 94110 ARCUEIL</div>
  <div class="doc-plbl">Planning ${docName} par SITES</div>
  <div class="doc-psub">Édition du ${ed}</div>
  <div class="doc-attn">ATTENTION : ce planning est susceptible d'être modifié</div>`;

  /* ── Légende (écran) ── */
  h+=`<div class="legend no-print">`;
  if(agent==='ALL'||agent==='A')h+=`<div class="leg"><div class="leg-sq" style="background:#dce8f7;"></div>${names.A}</div>`;
  if(agent==='ALL'||agent==='B')h+=`<div class="leg"><div class="leg-sq" style="background:#d3f0e4;"></div>${names.B} (Mar/Mer/Jeu)</div>`;
  if(agent==='ALL'||agent==='X')h+=`<div class="leg"><div class="leg-sq" style="background:#faeeda;"></div>Agent Extra</div>`;
  if(agent==='A')h+=`<div class="leg"><div class="leg-sq" style="background:#eaeae4;border-color:#bbb;"></div>Congé Mostapha (sem. ${restWeek})</div>`;
  h+=`<span class="leg-drag no-print">↔ glisser horizontalement = garde la couleur &nbsp;|&nbsp; ↕ glisser verticalement = prend la couleur de la ligne</span>`;
  h+=`</div>`;

  /* ── Tableau ── */
  h+=`<div class="tbl-wrap"><table class="pt"><tbody>`;

  // Ligne 1 : mois + lettres des jours
  h+=`<tr><td class="cm" rowspan="2">${MONTHS[month]}<br>${year}</td>`;
  for(let d=1;d<=D;d++)h+=`<td class="cdl${isWE(year,month,d)?' we':''}">${DL[dow(year,month,d)]}</td>`;
  h+=`</tr>`;

  // Ligne 2 : numéros des jours
  h+=`<tr>`;
  for(let d=1;d<=D;d++)h+=`<td class="cdn${isWE(year,month,d)?' we':''}">${pad(d)}</td>`;
  h+=`</tr>`;

  // Lignes agents
  for(const{code,lbl}of rows){
    h+=`<tr><td class="cl">${lbl}</td>`;
    for(let d=1;d<=D;d++){
      const val=s[d]||'';
      let cls,inner,draggable='false';

      if(val===code){
        // Jour travaillé par cet agent
        cls=`cc ${colors[code]}`;
        draggable='true';
        inner=`<div class="ci"><span class="badge">J01</span><span class="hrs">07:00</span><span class="hrs">19:00</span></div>`;
      }else if(code==='A'&&restDays.has(d)&&val!=='A'){
        // Bloc congé Mostapha
        cls='cc sRB';
        inner=`<div class="ci"><span>REPOS</span></div>`;
      }else{
        // Repos / non affecté
        cls='cc sR';
        inner=`<div class="ci"></div>`;
      }

      h+=`<td class="${cls}"
        draggable="${draggable}"
        data-day="${d}"
        data-row="${code}"
        ondragstart="onDragStart(event,${d},'${code}')"
        ondragend="onDragEnd(event)"
        ondragover="onDragOver(event,${d},'${code}')"
        ondragleave="onDragLeave(event,${d},'${code}')"
        ondrop="onDrop(event,${d},'${code}')">${inner}</td>`;
    }
    h+=`</tr>`;
  }

  // Ligne totaux
  h+=`<tr><td class="ctotl">Total quotidien<br>attribué :</td>`;
  for(let d=1;d<=D;d++){
    const inView=rows.some(({code})=>s[d]===code);
    h+=`<td class="ctot">${inView?12:''}</td>`;
  }
  h+=`</tr></tbody></table></div>`;

  /* ── Pied de page document ── */
  h+=`<div class="doc-ft">
    Site : ${siteName} &mdash; 55-57 Avenue Raymond POINCARÉ &mdash; 75116 PARIS &mdash; Tél : 01 44 05 66 66<br>
    J01 : AGENT DE SÉCURITÉ JOUR (SSIAP 1) de 07h00 à 19h00
  </div>`;

  /* ── Statistiques (écran) ── */
  h+=`<div class="stats no-print">
    <div class="sbox"><div class="slbl">${short.A}</div><div class="sval" style="color:var(--blue)">${cnt.A}<span class="ssub"> jours</span></div></div>
    <div class="sbox"><div class="slbl">${short.B} (Mar/Mer/Jeu)</div><div class="sval" style="color:var(--green)">${cnt.B}<span class="ssub"> jours</span></div></div>
    <div class="sbox"><div class="slbl">Extra</div><div class="sval" style="color:var(--amber)">${cnt.X}<span class="ssub"> jours</span></div></div>
    <div class="sbox"><div class="slbl">Non couverts</div><div class="sval" style="color:#aaa">${s.slice(1).filter(x=>!x).length}<span class="ssub"> / ${D}</span></div></div>
    <div class="sbox"><div class="slbl">Congé Mostapha</div><div class="sval" style="color:#888">${(wm[restWeek]||[]).length}<span class="ssub"> j (S${restWeek})</span></div></div>
  </div>`;

  /* ── Validation (écran) ── */
  h+=renderValidation(s,D,year,month,wm,restWeek);

  h+=`</div>`;
  document.getElementById('out').innerHTML=h;
}

/* ═══════════════════════════════════════════════════════
   VALIDATION
═══════════════════════════════════════════════════════ */
function renderValidation(s,D,year,month,wm,restWeek){
  const errs=[],warns=[],oks=[];

  // Jours consécutifs max
  function chkConsec(code,maxC,name){
    let streak=0,maxS=0;
    for(let d=1;d<=D;d++){if(s[d]===code){streak++;maxS=Math.max(maxS,streak);}else streak=0;}
    if(maxS>maxC)errs.push(`${name} : ${maxS} jours consécutifs (max autorisé : ${maxC})`);
    else oks.push(`${name} : consécutifs OK — max détecté : ${maxS}j`);
  }
  chkConsec('A',2,'Mostapha');
  chkConsec('B',3,'Roger');

  // Jours isolés
  function chkIsolated(code,name){
    const iso=[];
    for(let d=1;d<=D;d++){
      if(s[d]!==code)continue;
      const prev=d>1?s[d-1]===code:false;
      const next=d<D?s[d+1]===code:(code==='A'); // dernier jour = raccordement mois suivant
      if(!prev&&!next)iso.push(d);
    }
    if(iso.length>0)warns.push(`${name} : ${iso.length} jour(s) isolé(s) — jours : ${iso.join(', ')} (corrigez par glisser-déposer)`);
    else oks.push(`${name} : aucun jour isolé ✓`);
  }
  chkIsolated('A','Mostapha');
  chkIsolated('B','Roger');

  // Max 4j/semaine
  function chkWeekly(code,name){
    let bad=false;
    for(const[wn,days]of Object.entries(wm)){
      const c=days.filter(d=>s[d]===code).length;
      if(c>4){errs.push(`${name} : semaine ${wn} = ${c} jours (max 4)`);bad=true;}
    }
    if(!bad)oks.push(`${name} : max 4j/semaine OK ✓`);
  }
  chkWeekly('A','Mostapha');
  chkWeekly('B','Roger');

  // Roger Mardi/Mercredi/Jeudi
  let rogPref=0,rogTotal=0;
  for(let d=1;d<=D;d++){
    if(s[d]!=='B')continue;
    rogTotal++;
    const dw=dow(year,month,d);
    if(dw===2||dw===3||dw===4)rogPref++;
  }
  const pct=rogTotal>0?Math.round(rogPref/rogTotal*100):0;
  if(pct>=85)oks.push(`Roger : ${rogPref}/${rogTotal} jours sur Mar/Mer/Jeu (${pct}%) ✓`);
  else if(pct>=60)warns.push(`Roger : ${rogPref}/${rogTotal} jours sur Mar/Mer/Jeu (${pct}%) — contrainte partiellement respectée`);
  else warns.push(`Roger : seulement ${rogPref}/${rogTotal} jours sur Mar/Mer/Jeu (${pct}%) — vérifier le planning`);

  // Comptage cibles
  const cA=s.slice(1).filter(x=>x==='A').length;
  const cB=s.slice(1).filter(x=>x==='B').length;
  if(cA<12)warns.push(`Mostapha : ${cA} jours ce mois (cible : 13)`);
  if(cB<12)warns.push(`Roger : ${cB} jours ce mois (cible : 13)`);

  let h=`<div class="val no-print">`;
  for(const e of errs)h+=`<div class="vi ver"><span class="vd">✗</span>${e}</div>`;
  for(const w of warns)h+=`<div class="vi vwn"><span class="vd">⚠</span>${w}</div>`;
  if(errs.length===0&&warns.length===0)
    h+=`<div class="vi vok"><span class="vd">✓</span>Toutes les contraintes sont respectées — planning optimal</div>`;
  for(const o of oks)h+=`<div class="vi vok"><span class="vd">✓</span>${o}</div>`;
  h+=`</div>`;
  return h;
}

/* ═══════════════════════════════════════════════════════
   INIT — génère le mois prochain par défaut
═══════════════════════════════════════════════════════ */
window.addEventListener('load',()=>{
  const now=new Date();
  let m=now.getMonth()+2;let y=now.getFullYear();
  if(m>12){m=1;y++;}
  // Trouver l'option année correcte
  const ySel=document.getElementById('sel-year');
  [...ySel.options].forEach(o=>{if(parseInt(o.value)===y)o.selected=true;});
  document.getElementById('sel-month').value=m;
  generate();
});
</script>
