<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blue:#1a4fa0;--blu:#dce8f7;--green:#0f7a55;--grn:#d3f0e4;--amber:#8a5200;--amb:#faeeda;--red:#c00;--gray:#f0efea;--bdr:#d0d0cc;--txt:#1a1a18;--mut:#6a6a66;--bg:#e8e7e2;--wht:#fff;--shd:0 2px 12px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);}

.fld label{display:block;font-size:9.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);margin-bottom:5px;}
.fld select,.fld input{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--txt);background:var(--wht);transition:border-color .15s,box-shadow .15s;}

/* TABLE */

.dft{margin-top:9px;font-size:9px;color:#888;border-top:.5px solid #ccc;padding-top:6px;line-height:1.6;}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr);}

.slb{font-size:9.5px;color:var(--mut);margin-bottom:3px;font-weight:500;}
.sv{font-size:17px;font-weight:600;font-family:'IBM Plex Mono',monospace;}

/* WE MEMORY */
.wemem{background:var(--blu);border:1px solid rgba(26,79,160,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:#0d3270;margin-top:10px;}

/* VALIDATION */
.val{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.vi{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;padding:6px 12px;border-radius:6px;}
.vok{background:var(--grn);color:var(--green);}
.vwn{background:var(--amb);color:var(--amber);}
.ver{background:#fce8e8;color:#a32d2d;}
.vd{font-size:12px;flex-shrink:0;margin-top:1px;}
/* PRINT */
@media print{
  body{background:#fff;padding:0;}
  .no-print{display:none!important;}
  .outc{box-shadow:none;padding:6px;border-radius:0;}
  .cc{cursor:default;}
  table.pt td{border-color:#999;}
  .sA{background:#ccd8ee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sB{background:#bce8d3!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sX{background:#f0ddb0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sCG{background:#ddddd8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .tcm,.tcl,.tcdl,.tcdn,.tctot,.tctotl{background:#ddddd8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>

<body>
<div class="app">

<!-- HEADER -->

    <div>
      <div class="htit">BAC <span>UP</span> ‚Äî Planning G√©n√©rateur automatique</div>

<!-- CONFIG -->
<div class="cfg no-print">
  <div class="cttl">Param√®tres</div>
  <div class="cgrid">
    <div class="fld">

      <select id="p-month" onchange="populateDays()">
        <option value="1">Janvier</option><option value="2">F√©vrier</option>

        <option value="2026">2026</option><option value="2027">2027</option>

        <option value="A">Mostapha LAHOUAOUI</option>

  </div>
</div>

<!-- OUTPUT -->
<div class="outc" id="out">
  <div class="ph"><div class="ph-i">üìã</div><h3>Aucun planning g√©n√©r√©</h3><p>Configurez les param√®tres puis cliquez sur <strong>G√©n√©rer le planning</strong>.</p></div>
</div>

<script>
const MN=['','Janvier','F√©vrier','Mars','Avril','Mai','Juin','Juillet','Ao√ªt','Septembre','Octobre','Novembre','D√©cembre'];
const MS=['','Jan','F√©v','Mar','Avr','Mai','Juin','Juil','Ao√ªt','Sep','Oct','Nov','D√©c'];
const DL=['D','L','M','M','J','V','S'];
const DLG=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const APP={sc:null,y:null,m:null,rs:null,re:null,lastWEOut:null};
let DRG=null;

const dim=(y,m)=>new Date(y,m,0).getDate();
const dow=(y,m,d)=>new Date(y,m-1,d).getDay();
const isWE=(y,m,d)=>{const w=dow(y,m,d);return w===0||w===6;};
const pad=n=>String(n).padStart(2,'0');
const gv=id=>document.getElementById(id).value.trim();

/* ‚îÄ‚îÄ Week map ‚îÄ‚îÄ */
function getWM(y,m){
  const D=dim(y,m),fd=dow(y,m,1),off=fd===0?6:fd-1,wm={};
  for(let d=1;d<=D;d++){const wn=Math.ceil((d+off)/7);if(!wm[wn])wm[wn]=[];wm[wn].push(d);}
  return wm;
}

/* ‚îÄ‚îÄ Populate rest-day selector ‚îÄ‚îÄ */
function populateDays(){
  const month=parseInt(gv('p-month')),year=parseInt(gv('p-year'));
  const D=dim(year,month);
  const sel=document.getElementById('p-rest');
  const cur=parseInt(sel.value)||8;
  sel.innerHTML='';
  for(let d=1;d<=D-6;d++){
    const e=d+6;
    const o=document.createElement('option');
    o.value=d;
    const ds=DLG[dow(year,month,d)].substring(0,3);
    const es=DLG[dow(year,month,e)].substring(0,3);
    o.textContent=pad(d)+' ('+ds+') ‚Üí '+pad(e)+' ('+es+')';
    if(d===cur)o.selected=true;
    sel.appendChild(o);
  }
  if(!sel.value){
    for(let d=8;d<=D-6;d++){if(dow(year,month,d)===1){sel.value=d;break;}}
  }
  updatePreview();
}

function updatePreview(){
  const month=parseInt(gv('p-month')),year=parseInt(gv('p-year'));
  const rs=parseInt(document.getElementById('p-rest').value);
  if(!rs){document.getElementById('p-prev').textContent='';return;}
  const re=rs+6,D=dim(year,month);
  if(re>D){document.getElementById('p-prev').textContent='‚öÝ D√©passe fin du mois';return;}
  document.getElementById('p-prev').textContent=
    'üìÖ '+DLG[dow(year,month,rs)]+' '+pad(rs)+' ‚Üí '+DLG[dow(year,month,re)]+' '+pad(re);
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   ALGORITHME PRINCIPAL v5
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
function buildSchedule(year,month,restStart,lastWEWorker){
  const D=dim(year,month);
  const restEnd=Math.min(restStart+6,D);
  const restSet=new Set();
  for(let d=restStart;d<=restEnd;d++)restSet.add(d);

  const s=new Array(D+1).fill('');

  /* helpers cons√©cutifs */
  const cbef=(d,c)=>{let n=0,i=d-1;while(i>=1&&s[i]===c){n++;i--;}return n;};
  const caft=(d,c)=>{let n=0,i=d+1;while(i<=D&&s[i]===c){n++;i++;}return n;};
  const ctot=(d,c)=>cbef(d,c)+caft(d,c)+1;

  /* ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
     √âTAPE 1 ‚Äî WEEKENDS : alternance A/B
  ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  const sats=[];
  for(let d=1;d<=D;d++) if(dow(year,month,d)===6) sats.push(d);

  // Si le mois commence un Dimanche ‚Üí c'est la fin du WE pr√©c√©dent
  if(dow(year,month,1)===0){
    s[1]= restSet.has(1)
      ? (lastWEWorker==='A'?'B':'A')   // Mostapha en cong√© ‚Üí Roger
      : lastWEWorker;
  }

  // Qui prend le 1er WE de ce mois ?
  let nextWE=lastWEWorker==='A'?'B':'A';
  let lastWEOut=lastWEWorker;

  for(const sat of sats){
    let who=nextWE;
    // Si Mostapha est en cong√© ce WE ‚Üí forc√© Roger
    const satRest=restSet.has(sat);
    const sunRest=(sat+1<=D)&&restSet.has(sat+1);
    if(who==='A'&&(satRest||sunRest)) who='B';

    s[sat]=who;
    if(sat+1<=D&&dow(year,month,sat+1)===0) s[sat+1]=who;

    lastWEOut=who;
    nextWE=nextWE==='A'?'B':'A';
  }

  /* ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
     √âTAPE 2 ‚Äî ROGER (B) : groupes Mar+Mer+Jeu
     Objectif : 13-14 jours, pas isol√©s, max 3 cons√©cutifs
  ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  const wm=getWM(year,month);

  // Construire les groupes Mar/Mer/Jeu par semaine
  const rogerGrps=[];
  let grp=[];
  for(let d=1;d<=D;d++){
    const dw=dow(year,month,d);
    if(dw===2||dw===3||dw===4){grp.push(d);if(dw===4||d===D){if(grp.length)rogerGrps.push([...grp]);grp=[];}}
    else if(grp.length){rogerGrps.push([...grp]);grp=[];}
  }

  let bCnt=s.slice(1).filter(x=>x==='B').length;

  for(const g of rogerGrps){
    if(bCnt>=14) break;
    // Garder uniquement les jours disponibles (pas d√©j√Ý assign√©)
    const avail=g.filter(d=>s[d]==='');
    if(!avail.length) continue;

    // Calculer les slots restants cette semaine
    const wn=Math.ceil((avail[0]+( (fd=dow(year,month,1))===0?6:fd-1 ))/7);
    const bInWk=(wm[wn]||[]).filter(d=>s[d]==='B').length;
    const slots=4-bInWk;
    if(slots<=0) continue;

    const take=Math.min(avail.length,slots,14-bCnt);

    if(take>=2){
      for(let i=0;i<take;i++){s[avail[i]]='B';bCnt++;}
    }else if(take===1){
      // N'ajouter que si adjacent √Ý un B existant (√©vite isolation)
      const d=avail[0];
      if((d>1&&s[d-1]==='B')||(d<D&&s[d+1]==='B')){s[d]='B';bCnt++;}
    }
  }

  // Compl√©ter si < 13 avec des jours adjacents √Ý des blocs B existants
  if(bCnt<13){
    for(let d=1;d<=D&&bCnt<13;d++){
      if(s[d]!=='') continue;
      const lb=d>1&&s[d-1]==='B',rb=d<D&&s[d+1]==='B';
      if((lb||rb)&&ctot(d,'B')<=3&&cbef(d,'B')+caft(d,'B')+1<=3){
        s[d]='B';bCnt++;
      }
    }
  }

  /* ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
     √âTAPE 3 ‚Äî MOSTAPHA (A) : paires strictes
     Objectif : exactement 13 jours, max 2 cons√©cutifs, pas isol√©s
  ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  const canA=d=>{
    if(d<1||d>D||s[d]!==''||restSet.has(d)) return false;
    if(cbef(d,'A')>=2||caft(d,'A')>=2) return false;
    if(cbef(d,'A')+caft(d,'A')+1>=3) return false;
    return true;
  };

  let aCnt=s.slice(1).filter(x=>x==='A').length;

  // Paires (d, d+1) avec gap de 2 pour √©viter les 3 cons√©cutifs
  let di=1;
  while(di<=D&&aCnt<13){
    if(canA(di)&&di+1<=D&&canA(di+1)&&cbef(di,'A')===0){
      s[di]='A';s[di+1]='A';aCnt+=2;di+=4;
    }else di++;
  }
  // Fallback : jours simples si toujours insuffisant
  if(aCnt<13){
    for(let d=1;d<=D&&aCnt<13;d++){if(canA(d)){s[d]='A';aCnt++;}}
  }

  /* ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
     √âTAPE 4 ‚Äî CORRECTIONS POST-HOC
  ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  // 4a. Pas de 4 jours cons√©cutifs pour personne (y compris Extra plus tard)
  const fixConsec=(code,maxC)=>{
    let ch=true,sf=0;
    while(ch&&sf++<30){
      ch=false;
      for(let d=1;d<=D;d++){
        if(s[d]!==code) continue;
        if(ctot(d,code)>maxC){
          let e=d;while(e+1<=D&&s[e+1]===code)e++;
          s[e]='';ch=true;break;
        }
      }
    }
  };
  fixConsec('B',3);
  fixConsec('A',2);

  // 4b. Supprimer les jours isol√©s A et B (‚Üí Extra)
  const fixIso=(code)=>{
    let ch=true,sf=0;
    while(ch&&sf++<10){
      ch=false;
      for(let d=1;d<=D;d++){
        if(s[d]!==code) continue;
        const lb=d>1&&s[d-1]===code;
        const rb=d<D&&s[d+1]===code;
        if(!lb&&!rb){s[d]='';ch=true;}
      }
    }
  };
  fixIso('A');
  fixIso('B');

  // 4c. Reconstruire si des jours ont √©t√© retir√©s pour atteindre 13 A
  aCnt=s.slice(1).filter(x=>x==='A').length;
  if(aCnt<13){
    di=1;
    while(di<=D&&aCnt<13){
      if(canA(di)&&di+1<=D&&canA(di+1)&&cbef(di,'A')===0){
        s[di]='A';s[di+1]='A';aCnt+=2;di+=4;
      }else di++;
    }
  }

  /* ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
     √âTAPE 5 ‚Äî EXTRA : tout le reste
  ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  for(let d=1;d<=D;d++) if(s[d]==='') s[d]='X';

  // 5a. V√©rifier pas de 4 cons√©cutifs pour Extra aussi
  fixConsec('X',3);

  return{sc:s,re:restEnd,lastWEOut};
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

   DRAG & DROP
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
function dStart(e,d,r){DRG={d,r};e.dataTransfer.effectAllowed='move';requestAnimationFrame(()=>{const el=document.querySelector('[data-d="'+d+'"][data-r="'+r+'"]');if(el)el.classList.add('dgh');});}
function dEnd(){document.querySelectorAll('.dgh,.dhl').forEach(el=>el.classList.remove('dgh','dhl'));DRG=null;}
function dOver(e,d,r){if(!DRG)return;e.preventDefault();const el=document.querySelector('[data-d="'+d+'"][data-r="'+r+'"]');if(el)el.classList.add('dhl');}
function dLeave(e,d,r){const el=document.querySelector('[data-d="'+d+'"][data-r="'+r+'"]');if(el)el.classList.remove('dhl');}
function dDrop(e,td,tr){
  e.preventDefault();
  document.querySelectorAll('.dgh,.dhl').forEach(el=>el.classList.remove('dgh','dhl'));
  if(!DRG)return;
  const{d:sd,r:sr}=DRG;DRG=null;
  if(sd===td&&sr===tr)return;
  if(sr===tr){const tmp=APP.sc[td];APP.sc[td]=APP.sc[sd];APP.sc[sd]=tmp;}
  else{APP.sc[sd]='X';APP.sc[td]=tr;}
  render();
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   VALIDATION
‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
function renderVal(s,D,year,month,restStart){
  const errs=[],warns=[],oks=[];
  const wm=getWM(year,month);

  // Max cons√©cutifs
  function chkC(code,max,name){
    let st=0,mx=0;
    for(let d=1;d<=D;d++){if(s[d]===code){st++;mx=Math.max(mx,st);}else st=0;}
    if(mx>max) errs.push(name+' : bloc de '+mx+' jours cons√©cutifs (max '+max+')');
    else oks.push(name+' : cons√©cutifs OK (max '+mx+'/'+max+') ‚úì');
  }
  chkC('A',2,'Mostapha');chkC('B',3,'Roger');chkC('X',3,'Extra');

  // Jours isol√©s
  function chkI(code,name){
    const iso=[];
    for(let d=1;d<=D;d++){
      if(s[d]!==code) continue;
      const lb=d>1&&s[d-1]===code,rb=d<D&&s[d+1]===code;
      if(!lb&&!rb) iso.push(d);
    }
    if(iso.length) warns.push(name+' : '+iso.length+' jour(s) isol√©(s) ‚Äî jours '+iso.join(', '));
    else oks.push(name+' : aucun jour isol√© ‚úì');
  }
  chkI('A','Mostapha');chkI('B','Roger');

  // Max 4j/semaine
  ['A','B'].forEach(code=>{
    const name=code==='A'?'Mostapha':'Roger';let bad=false;
    for(const[wn,days]of Object.entries(wm)){
      const c=days.filter(d=>s[d]===code).length;
      if(c>4){errs.push(name+' : semaine '+wn+' = '+c+' jours (max 4)');bad=true;}
    }
    if(!bad) oks.push(name+' : max 4j/semaine ‚úì');
  });

  // Roger Mar/Mer/Jeu
  let rp=0,rt=s.slice(1).filter(x=>x==='B').length;
  for(let d=1;d<=D;d++){if(s[d]==='B'){const dw=dow(year,month,d);if(dw===2||dw===3||dw===4)rp++;}}
  const pct=rt>0?Math.round(rp/rt*100):0;
  if(pct>=80) oks.push('Roger : '+rp+'/'+rt+' jours Mar¬∑Mer¬∑Jeu ('+pct+'%) ‚úì');
  else warns.push('Roger : '+rp+'/'+rt+' jours Mar¬∑Mer¬∑Jeu ('+pct+'%)');

  // Comptes
  const cA=s.slice(1).filter(x=>x==='A').length;
  const cB=s.slice(1).filter(x=>x==='B').length;
  if(cA!==13) warns.push('Mostapha : '+cA+' jours (cible exacte : 13)');
  else oks.push('Mostapha : 13 jours ‚úì');
  if(cB<13||cB>14) warns.push('Roger : '+cB+' jours (cible 13-14)');
  else oks.push('Roger : '+cB+' jours ‚úì');

  // Alternance WE
  const sats=[];for(let d=1;d<=D;d++)if(dow(year,month,d)===6)sats.push(d);
  let weOk=true;
  for(let i=1;i<sats.length;i++){
    const prev=s[sats[i-1]],cur=s[sats[i]];
    if(prev==='X'||cur==='X') continue;
    if(prev===cur){weOk=false;break;}
  }
  if(weOk) oks.push('Alternance weekends A/B ‚úì');
  else warns.push('Alternance weekends : v√©rifier manuellement');

  let h='<div class="val no-print">';
  for(const e of errs) h+='<div class="vi ver"><span class="vd">‚úó</span>'+e+'</div>';
  for(const w of warns) h+='<div class="vi vwn"><span class="vd">‚öÝ</span>'+w+'</div>';
  if(!errs.length&&!warns.length) h+='<div class="vi vok"><span class="vd">‚úì</span>Toutes les contraintes respect√©es ‚Äî planning optimal</div>';
  for(const o of oks) h+='<div class="vi vok"><span class="vd">‚úì</span>'+o+'</div>';
  h+='</div>';return h;
}
