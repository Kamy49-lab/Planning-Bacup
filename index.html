<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Planning BAC UP</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1a4fa0;--blu:#dce8f7;--green:#0f7a55;--grn:#d3f0e4;
  --amber:#8a5200;--amb:#faeeda;--red:#c00;--gray:#f0efea;
  --bdr:#d0d0cc;--txt:#1a1a18;--mut:#6a6a66;--bg:#e8e7e2;
  --wht:#fff;--shd:0 2px 12px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:18px;}
.app{max-width:1360px;margin:0 auto;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.hlogo{display:flex;align-items:center;gap:10px;}
.htri{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:24px solid var(--blue);}
.htit{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;letter-spacing:1px;color:var(--blue);}
.hsub{font-size:11px;color:var(--mut);margin-top:3px;}
.hver{background:var(--blue);color:#fff;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:3px;letter-spacing:1px;}
.cfg{background:var(--wht);border-radius:10px;box-shadow:var(--shd);padding:18px 22px;margin-bottom:14px;}
.cttl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.cttl::after{content:'';flex:1;height:1px;background:var(--bdr);}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:16px;}
.fld label{display:block;font-size:9.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);margin-bottom:5px;}
.fld select,.fld input{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--txt);background:var(--wht);transition:border-color .15s,box-shadow .15s;}
.fld select:focus,.fld input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,79,160,.1);}
.fld .nte{font-size:9px;color:var(--mut);margin-top:4px;line-height:1.4;}
.fld input[readonly]{background:var(--gray);color:var(--mut);cursor:not-allowed;}
.rprev{font-size:11px;color:var(--blue);margin-top:5px;font-weight:500;min-height:16px;}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'IBM Plex Sans',sans-serif;transition:opacity .15s,transform .1s;}
.btn:hover{opacity:.84;}.btn:active{transform:scale(.97);}
.bgo{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(26,79,160,.28);}
.bpr{background:#1a1a18;color:#fff;}
.brs{background:var(--gray);color:var(--txt);border:1px solid var(--bdr);}
.bdv{width:1px;height:28px;background:var(--bdr);margin:0 2px;}
.outc{background:var(--wht);border-radius:10px;box-shadow:var(--shd);padding:22px;}
.ph{text-align:center;padding:70px 20px;color:var(--mut);}
.ph-i{font-size:36px;margin-bottom:12px;}
.ph h3{font-size:16px;font-weight:500;margin-bottom:5px;}
.ph p{font-size:13px;}
.dtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.dlogo{display:flex;align-items:center;gap:10px;}
.dtri{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:20px solid var(--blue);}
.dwm{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;letter-spacing:3px;color:var(--txt);}
.dwm span{color:var(--blue);}
.dref{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mut);font-weight:600;}
.dadr{font-size:11.5px;line-height:1.75;color:#444;margin-bottom:5px;}
.dadr strong{color:var(--txt);font-weight:600;}
.dplb{font-size:11px;font-weight:700;color:var(--txt);}
.dpsb{font-size:10.5px;color:var(--mut);margin-bottom:5px;}
.datn{font-size:10.5px;color:var(--amber);font-style:italic;margin-bottom:12px;}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mut);}
.lsq{width:11px;height:11px;border-radius:2px;border:1px solid rgba(0,0,0,.12);flex-shrink:0;}
.ldtip{font-size:10px;color:var(--mut);font-style:italic;margin-left:auto;background:var(--gray);padding:4px 8px;border-radius:4px;}
.twrap{overflow-x:auto;}
table.pt{border-collapse:collapse;min-width:840px;width:100%;font-size:9.5px;}
table.pt td{border:.5px solid #bbb;text-align:center;padding:0;}
.tcm{background:#e0e0da;font-weight:700;font-size:12px;padding:5px 7px;min-width:72px;width:72px;line-height:1.5;}
.tcl{background:#e0e0da;font-size:8.5px;font-weight:600;color:#444;text-align:left;padding:2px 5px;min-width:82px;width:82px;white-space:nowrap;vertical-align:middle;line-height:1.4;}
.tcdl{background:#e0e0da;font-size:8.5px;font-weight:700;color:#555;padding:2px 0;min-width:19px;width:19px;}
.tcdl.we{color:var(--red);}
.tcdn{background:#e0e0da;font-size:9.5px;font-weight:700;color:var(--txt);padding:2px 0;}
.tcdn.we{color:var(--red);}
.cc{position:relative;transition:filter .12s;}
.cc[draggable=true]{cursor:grab;}
.cc.dhl{outline:2px dashed var(--blue);outline-offset:-2px;filter:brightness(.9);}
.cc.dgh{opacity:.35;}
.ci{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:30px;padding:1px;line-height:1.2;user-select:none;}
.ci .bge{font-size:7.5px;font-weight:700;}
.ci .hrs{font-size:6.5px;}
.sA{background:var(--blu);}.sA .bge{color:#1a4fa0;}.sA .hrs{color:#1a4fa0;}
.sB{background:var(--grn);}.sB .bge{color:var(--green);}.sB .hrs{color:var(--green);}
.sX{background:var(--amb);}.sX .bge{color:var(--amber);}.sX .hrs{color:var(--amber);}
.sR{background:#fff;}
.sCG{background:#eaeae4;}.sCG .ci span{font-size:6px;color:#aaa;}
.tctot{background:#e0e0da;font-size:8.5px;font-weight:700;color:var(--txt);padding:2px 0;}
.tctotl{background:#e0e0da;text-align:left!important;padding:2px 5px!important;font-size:8.5px;color:#555;line-height:1.4;}
.dft{margin-top:9px;font-size:9px;color:#888;border-top:.5px solid #ccc;padding-top:6px;line-height:1.6;}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr);}
.sb{background:var(--gray);border-radius:7px;padding:9px 12px;}
.slb{font-size:9.5px;color:var(--mut);margin-bottom:3px;font-weight:500;}
.sv{font-size:17px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.ss{font-size:10px;color:var(--mut);font-weight:400;}
.wemem{background:var(--blu);border:1px solid rgba(26,79,160,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:#0d3270;margin-top:10px;}
.wemem strong{font-weight:600;}
.val{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.vi{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;padding:6px 12px;border-radius:6px;}
.vok{background:var(--grn);color:var(--green);}
.vwn{background:var(--amb);color:var(--amber);}
.ver{background:#fce8e8;color:#a32d2d;}
.vd{font-size:12px;flex-shrink:0;margin-top:1px;}
@media print{
  body{background:#fff;padding:0;}
  .no-print{display:none!important;}
  .outc{box-shadow:none;padding:6px;border-radius:0;}
  table.pt td{border-color:#999;}
  .sA{background:#ccd8ee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sB{background:#bce8d3!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sX{background:#f0ddb0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sCG{background:#ddddd8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .tcm,.tcl,.tcdl,.tcdn,.tctot,.tctotl{background:#ddddd8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}</style>
</head>
<body>
<div class="app">

<div class="hdr no-print">
  <div class="hlogo"><div class="htri"></div>
    <div>
      <div class="htit">BAC UP &mdash; Planning G&eacute;n&eacute;rateur automatique</div>
      <div class="hsub">SSIAP 1 &nbsp;&middot;&nbsp; Vacation J01 &nbsp;&middot;&nbsp; 07h00 &ndash; 19h00 (12h)</div>
    </div>
  </div>
  <div class="hver">v8.0</div>
</div>

<div class="cfg no-print">
  <div class="cttl">Param&egrave;tres</div>
  <div class="cgrid">
    <div class="fld"><label>Mois</label>
      <select id="p-month" onchange="populateDays()">
        <option value="1">Janvier</option><option value="2">F&eacute;vrier</option>
        <option value="3">Mars</option><option value="4">Avril</option>
        <option value="5">Mai</option><option value="6">Juin</option>
        <option value="7">Juillet</option><option value="8">Ao&ucirc;t</option>
        <option value="9">Septembre</option><option value="10">Octobre</option>
        <option value="11">Novembre</option><option value="12">D&eacute;cembre</option>
      </select>
    </div>
    <div class="fld"><label>Ann&eacute;e</label>
      <select id="p-year" onchange="populateDays()">
        <option value="2026">2026</option><option value="2027">2027</option>
        <option value="2028">2028</option><option value="2029">2029</option>
        <option value="2030">2030</option>
      </select>
    </div>
    <div class="fld"><label>Agent affich&eacute;</label>
      <select id="p-agent">
        <option value="ALL">TOUS &mdash; Complet</option>
        <option value="A">Mostapha LAHOUAOUI</option>
        <option value="B">Roger DE SOUZA</option>
        <option value="X">Agent EXTRA</option>
      </select>
    </div>
    <div class="fld"><label>Nom du site</label>
      <input type="text" id="p-site" value="RENAISSANCE PARIS NOBEL TOUR EIFFEL" readonly>
    </div>
    <div class="fld"><label>R&eacute;f. document</label>
      <input type="text" id="p-ref" value="1504">
    </div>
    <div class="fld"><label>Cong&eacute; Mostapha &mdash; d&eacute;but (5-7 j.)</label>
      <select id="p-rest" onchange="updatePreview()"></select>
      <div class="rprev" id="p-prev"></div>
    </div>
    <div class="fld"><label>Dernier WE mois pr&eacute;c&eacute;dent</label>
      <select id="p-lastwo">
        <option value="A">Mostapha LAHOUAOUI</option>
        <option value="B">Roger DE SOUZA</option>
      </select>
      <div class="nte">Qui a travaill&eacute; le dernier Sam-Dim du mois pass&eacute; ?</div>
    </div>
  </div>
  <div class="brow">
    <button class="btn bgo" onclick="generate()">&#9654; G&eacute;n&eacute;rer le planning</button>
    <div class="bdv"></div>
    <button class="btn bpr" onclick="window.print()">&#128424; Imprimer / PDF</button>
    <button class="btn brs" onclick="resetPlan()">&#8635; R&eacute;initialiser</button>
  </div>
</div>

<div class="outc" id="out">
  <div class="ph">
    <div class="ph-i">&#128203;</div>
    <h3>Aucun planning g&eacute;n&eacute;r&eacute;</h3>
    <p>Configurez les param&egrave;tres puis cliquez sur <strong>G&eacute;n&eacute;rer le planning</strong>.</p>
  </div>
</div>
</div>
<script>
var MNF=["","Janvier","F\u00e9vrier","Mars","Avril","Mai","Juin",
  "Juillet","Ao\u00fbt","Septembre","Octobre","Novembre","D\u00e9cembre"];
var DL=["D","L","M","M","J","V","S"];
var DLG=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
var APP={sc:null,y:null,m:null,rs:null,re:null,actualRe:null,lastWEOut:null};
var DRG=null;

function dim(y,m){return new Date(y,m,0).getDate();}
function dow(y,m,d){return new Date(y,m-1,d).getDay();}
function isWE(y,m,d){var w=dow(y,m,d);return w===0||w===6;}
function pad(n){return String(n).padStart(2,"0");}
function gv(id){return document.getElementById(id).value.trim();}

function getWM(y,m){
  var D=dim(y,m),fd=dow(y,m,1),off=fd===0?6:fd-1,wm={};
  for(var d=1;d<=D;d++){
    var wn=Math.ceil((d+off)/7);
    if(!wm[wn])wm[wn]=[];
    wm[wn].push(d);
  }
  return wm;
}

function populateDays(){
  var month=parseInt(gv("p-month")),year=parseInt(gv("p-year"));
  var D=dim(year,month);
  var sel=document.getElementById("p-rest");
  var cur=parseInt(sel.value)||0;
  sel.innerHTML="";
  for(var d=1;d<=D-4;d++){
    var e=d+6<=D?d+6:D;
    var o=document.createElement("option");
    o.value=d;
    o.textContent=pad(d)+" ("+DLG[dow(year,month,d)].substring(0,3)
      +") \u2192 "+pad(e)+" ("+DLG[dow(year,month,e)].substring(0,3)+")";
    if(d===cur)o.selected=true;
    sel.appendChild(o);
  }
  if(!sel.value||parseInt(sel.value)===0){
    for(var d2=8;d2<=D-4;d2++){
      if(dow(year,month,d2)===1){sel.value=d2;break;}
    }
    if(!sel.value&&sel.options.length)sel.value=sel.options[0].value;
  }
  updatePreview();
}

function updatePreview(){
  var month=parseInt(gv("p-month")),year=parseInt(gv("p-year"));
  var rs=parseInt(document.getElementById("p-rest").value);
  var el=document.getElementById("p-prev");
  if(!rs){el.textContent="";return;}
  var re=Math.min(rs+6,dim(year,month));
  el.textContent="\uD83D\uDCC5 "
    +DLG[dow(year,month,rs)]+" "+pad(rs)
    +" \u2192 "
    +DLG[dow(year,month,re)]+" "+pad(re)
    +" (pr\u00e9f\u00e9rence, non obligatoire)";
}

// ═══════════════════════════════════════════════════════════
// ALGORITHME v8
// Priorites dans l'ordre :
//  1. 13j chacun pour A et B — STRICT
//  2. Roger : preference Mar/Mer/Jeu
//  3. Mostapha : preference paires, conge soft (5-7j)
//  4. Weekends alternes A/B
//  5. Pas de 4 consecutifs
//  6. Pas de jours isoles pour A et B
// ═══════════════════════════════════════════════════════════
function buildSchedule(year,month,restStart,lastWEWorker){
  var D=dim(year,month);
  var TARGET=13;

  // Conge Mostapha = preference (pas obligatoire)
  // On essaie de respecter les 7j mais on cede si necessaire
  var congePref={};
  var congeEnd=Math.min(restStart+6,D);
  for(var d=restStart;d<=congeEnd;d++)congePref[d]=true;

  // s[d] = "" | "A" | "B" | "X"
  var s=new Array(D+2).fill("");

  // ── helpers ──────────────────────────────────────────────
  function free(d){return d>=1&&d<=D&&s[d]==="";}
  function is(d,c){return d>=1&&d<=D&&s[d]===c;}
  function runBef(d,c){var n=0,i=d-1;while(i>=1&&s[i]===c){n++;i--;}return n;}
  function runAft(d,c){var n=0,i=d+1;while(i<=D&&s[i]===c){n++;i++;}return n;}
  function runTot(d,c){return runBef(d,c)+1+runAft(d,c);}
  function countC(c){var n=0;for(var i=1;i<=D;i++)if(s[i]===c)n++;return n;}
  function wkOf(d){
    var fd=dow(year,month,1),off=fd===0?6:fd-1;
    return Math.ceil((d+off)/7);
  }
  function wkCount(d,c){
    var wm=getWM(year,month),wn=wkOf(d),days=wm[wn]||[],n=0;
    for(var i=0;i<days.length;i++)if(s[days[i]]===c)n++;
    return n;
  }
  // peut-on placer c en d sans depasser 3 consecutifs ?
  function wouldExceed(d,c,maxC){
    return runBef(d,c)+1+runAft(d,c)>maxC;
  }

  // ── ETAPE 1 : Weekends alternes A/B ──────────────────────
  var sats=[];
  for(var d=1;d<=D;d++)if(dow(year,month,d)===6)sats.push(d);

  // Dimanche 1er = tail du WE precedent
  if(dow(year,month,1)===0)s[1]=lastWEWorker;

  var nextWE=(lastWEWorker==="A")?"B":"A";
  var lastWEOut=lastWEWorker;

  for(var si=0;si<sats.length;si++){
    var sat=sats[si],who=nextWE;
    // si Mostapha en conge ET c'est son tour, passer a Roger
    if(who==="A"&&(congePref[sat]||(sat+1<=D&&congePref[sat+1])))who="B";
    s[sat]=who;
    if(sat+1<=D&&dow(year,month,sat+1)===0)s[sat+1]=who;
    lastWEOut=who;
    nextWE=(nextWE==="A")?"B":"A";
  }

  // ── ETAPE 2 : Roger (B) — 13 jours ──────────────────────
  // Priorite 1 : Mar+Mer+Jeu par semaine (groupes complets)
  // Priorite 2 : paires Mar+Mer ou Mer+Jeu
  // Priorite 3 : adjacents a B existant
  // Priorite 4 : paires libres hors WE
  // Priorite 5 : jours libres quelconques

  function trySetB(d){
    if(!free(d))return false;
    if(wkCount(d,"B")>=4)return false;
    if(wouldExceed(d,"B",3))return false;
    s[d]="B";
    return true;
  }

  function fillRoger(){
    var wm=getWM(year,month);
    var wns=Object.keys(wm).map(Number).sort(function(a,b){return a-b;});

    // P1 : triplets Mar/Mer/Jeu
    for(var wi=0;wi<wns.length&&countC("B")<TARGET;wi++){
      var days=wm[wns[wi]],tmj=[];
      for(var di=0;di<days.length;di++){
        var dw=dow(year,month,days[di]);
        if((dw===2||dw===3||dw===4)&&free(days[di]))tmj.push(days[di]);
      }
      if(tmj.length>=3&&countC("B")+3<=TARGET
         &&wkCount(tmj[0],"B")+3<=4
         &&!wouldExceed(tmj[0],"B",3)
         &&!wouldExceed(tmj[2],"B",3)){
        s[tmj[0]]="B";s[tmj[1]]="B";s[tmj[2]]="B";
      }
    }
    // P2 : paires Mar/Mer ou Mer/Jeu
    for(var wi=0;wi<wns.length&&countC("B")<TARGET;wi++){
      var days=wm[wns[wi]],tmj=[];
      for(var di=0;di<days.length;di++){
        var dw=dow(year,month,days[di]);
        if((dw===2||dw===3||dw===4)&&free(days[di]))tmj.push(days[di]);
      }
      if(tmj.length>=2&&countC("B")+2<=TARGET&&wkCount(tmj[0],"B")+2<=4){
        if(!wouldExceed(tmj[0],"B",3)&&!wouldExceed(tmj[1],"B",3)){
          s[tmj[0]]="B";s[tmj[1]]="B";
        }
      }
    }
    // P3 : jours Mar/Mer/Jeu adjacents a un B
    for(var d=1;d<=D&&countC("B")<TARGET;d++){
      var dw=dow(year,month,d);
      if((dw===2||dw===3||dw===4)&&free(d)){
        if((is(d-1,"B")||is(d+1,"B"))&&!wouldExceed(d,"B",3)&&wkCount(d,"B")<4){
          s[d]="B";
        }
      }
    }
    // P4 : paires libres hors WE
    for(var d=1;d<=D&&countC("B")<TARGET;d++){
      if(!free(d)||isWE(year,month,d))continue;
      if(d+1<=D&&free(d+1)&&!isWE(year,month,d+1)&&countC("B")+2<=TARGET){
        if(!wouldExceed(d,"B",3)&&wkCount(d,"B")+2<=4){
          s[d]="B";s[d+1]="B";d++;
        }
      }
    }
    // P5 : n'importe quel jour libre
    for(var d=1;d<=D&&countC("B")<TARGET;d++){
      if(free(d)&&!wouldExceed(d,"B",3)&&wkCount(d,"B")<4){
        s[d]="B";
      }
    }
  }
  fillRoger();

  // ── ETAPE 3 : Mostapha (A) — 13 jours ───────────────────
  // On essaie D'ABORD hors conge, puis si manque on prend dans le conge
  // Preference : paires (d,d+1), max 2 consecutifs

  function canSetA(d, respectConge){
    if(!free(d))return false;
    if(respectConge&&congePref[d])return false;
    if(wouldExceed(d,"A",2))return false;
    if(wkCount(d,"A")>=4)return false;
    return true;
  }

  function fillMostapha(respectConge){
    // Passe 1 : paires (d, d+1)
    for(var d=1;d<=D&&countC("A")<TARGET;d++){
      if(canSetA(d,respectConge)&&d+1<=D&&canSetA(d+1,respectConge)
         &&runBef(d,"A")===0&&runAft(d+1,"A")===0){
        s[d]="A";s[d+1]="A";d++; // skip d+1
      }
    }
    // Passe 2 : jours seuls si encore manquant
    for(var d=1;d<=D&&countC("A")<TARGET;d++){
      if(canSetA(d,respectConge))s[d]="A";
    }
  }

  // Essai 1 : en respectant le conge
  fillMostapha(true);
  // Si on n'a pas 13 jours, on relache le conge
  if(countC("A")<TARGET)fillMostapha(false);

  // ── ETAPE 4 : Corrections iteratives ─────────────────────

  // 4a. Supprimer blocs > max (A:2, B:3)
  function trimLong(code,maxC){
    var changed=true;
    while(changed){
      changed=false;
      for(var d=1;d<=D;d++){
        if(s[d]!==code)continue;
        if(runTot(d,code)>maxC){
          var e=d;while(e+1<=D&&s[e+1]===code)e++;
          s[e]="";changed=true;break;
        }
      }
    }
  }

  // 4b. Supprimer jours isoles pour A et B
  function removeIso(code){
    var changed=true;
    while(changed){
      changed=false;
      for(var d=1;d<=D;d++){
        if(s[d]!==code)continue;
        if(!is(d-1,code)&&!is(d+1,code)){s[d]="";changed=true;}
      }
    }
  }

  // 4c. Reassignation pour recuperer les 13 jours perdus
  function reassign(){
    trimLong("A",2);trimLong("B",3);
    removeIso("A");removeIso("B");
    if(countC("B")<TARGET)fillRoger();
    if(countC("A")<TARGET){
      fillMostapha(true);
      if(countC("A")<TARGET)fillMostapha(false);
    }
  }

  // 3 cycles de correction
  reassign();reassign();reassign();
  // Corrections finales sans reassignation
  trimLong("A",2);trimLong("B",3);

  // ── ETAPE 5 : Extra = reste ───────────────────────────────
  for(var d=1;d<=D;d++)if(s[d]==="")s[d]="X";
  trimLong("X",3);

  // Calculer le vrai conge de Mostapha (jours prefs non travailles)
  var actualConge=0;
  for(var d=restStart;d<=congeEnd;d++)if(s[d]!=="A")actualConge++;

  return{sc:s,re:congeEnd,actualConge:actualConge,lastWEOut:lastWEOut};
}

// ── Generate ──────────────────────────────────────────────
function generate(){
  var month=parseInt(gv("p-month")),year=parseInt(gv("p-year"));
  var restStart=parseInt(document.getElementById("p-rest").value);
  var lastWE=gv("p-lastwo");
  if(!restStart){alert("Choisissez le d\u00e9but du cong\u00e9.");return;}
  var res=buildSchedule(year,month,restStart,lastWE);
  APP.sc=res.sc;APP.y=year;APP.m=month;
  APP.rs=restStart;APP.re=res.re;
  APP.actualConge=res.actualConge;
  APP.lastWEOut=res.lastWEOut;
  render();
}
function resetPlan(){if(APP.y)generate();}

// ── Drag & Drop ───────────────────────────────────────────
function mkCell(cls2,draggable,d,code,inn){
  var td=document.createElement("td");
  td.className=cls2;
  td.draggable=draggable;
  td.setAttribute("data-d",String(d));
  td.setAttribute("data-r",code);
  td.addEventListener("dragstart",function(e){
    DRG={d:d,r:code};
    e.dataTransfer.effectAllowed="move";
    requestAnimationFrame(function(){
      var el=document.querySelector("[data-d='"+d+"'][data-r='"+code+"']");
      if(el)el.classList.add("dgh");
    });
  });
  td.addEventListener("dragend",function(){
    document.querySelectorAll(".dgh,.dhl").forEach(function(el){
      el.classList.remove("dgh","dhl");
    });
    DRG=null;
  });
  td.addEventListener("dragover",function(e){
    if(!DRG)return;
    e.preventDefault();
    var el=document.querySelector("[data-d='"+d+"'][data-r='"+code+"']");
    if(el)el.classList.add("dhl");
  });
  td.addEventListener("dragleave",function(){
    var el=document.querySelector("[data-d='"+d+"'][data-r='"+code+"']");
    if(el)el.classList.remove("dhl");
  });
  td.addEventListener("drop",function(e){
    e.preventDefault();
    document.querySelectorAll(".dgh,.dhl").forEach(function(el){
      el.classList.remove("dgh","dhl");
    });
    if(!DRG)return;
    var sd=DRG.d,sr=DRG.r;DRG=null;
    if(sd===d&&sr===code)return;
    if(sr===code){
      var tmp=APP.sc[d];APP.sc[d]=APP.sc[sd];APP.sc[sd]=tmp;
    }else{
      APP.sc[sd]="X";APP.sc[d]=code;
    }
    render();
  });
  td.innerHTML=inn;
  return td;
}

// ── Validation ────────────────────────────────────────────
function buildVal(s,D,year,month,cA,cB,cX){
  var errs=[],warns=[],oks=[];
  var wm=getWM(year,month);

  function maxRun(code){
    var st=0,mx=0;
    for(var d=1;d<=D;d++){if(s[d]===code){st++;if(st>mx)mx=st;}else st=0;}
    return mx;
  }
  function isoList(code){
    var iso=[];
    for(var d=1;d<=D;d++){
      if(s[d]!==code)continue;
      var lb=(d>1&&s[d-1]===code),rb=(d<D&&s[d+1]===code);
      if(!lb&&!rb)iso.push(d);
    }
    return iso;
  }

  // Consecutifs
  var mxA=maxRun("A"),mxB=maxRun("B"),mxX=maxRun("X");
  if(mxA>2)errs.push("Mostapha : "+mxA+" jours cons\u00e9cutifs (max 2)");
  else oks.push("Mostapha : max cons\u00e9cutifs OK ("+mxA+"/2) \u2713");
  if(mxB>3)errs.push("Roger : "+mxB+" jours cons\u00e9cutifs (max 3)");
  else oks.push("Roger : max cons\u00e9cutifs OK ("+mxB+"/3) \u2713");
  if(mxX>3)warns.push("Extra : "+mxX+" jours cons\u00e9cutifs");
  else oks.push("Extra : cons\u00e9cutifs OK ("+mxX+") \u2713");

  // Jours isoles
  var isoA=isoList("A"),isoB=isoList("B");
  if(isoA.length)warns.push("Mostapha : "+isoA.length+" jour(s) isol\u00e9(s) \u2014 "
    +"jours "+isoA.join(", "));
  else oks.push("Mostapha : aucun jour isol\u00e9 \u2713");
  if(isoB.length)warns.push("Roger : "+isoB.length+" jour(s) isol\u00e9(s) \u2014 "
    +"jours "+isoB.join(", "));
  else oks.push("Roger : aucun jour isol\u00e9 \u2713");

  // Max 4j/semaine
  ["A","B"].forEach(function(code){
    var name=(code==="A")?"Mostapha":"Roger",bad=false;
    for(var wn in wm){
      var days=wm[wn],c=0;
      for(var i=0;i<days.length;i++)if(s[days[i]]===code)c++;
      if(c>4){errs.push(name+" : semaine "+wn+" = "+c+"j (max 4)");bad=true;}
    }
    if(!bad)oks.push(name+" : max 4j/semaine \u2713");
  });

  // Roger Mar/Mer/Jeu
  var rp=0;
  for(var d=1;d<=D;d++){
    if(s[d]==="B"){var dw=dow(year,month,d);if(dw===2||dw===3||dw===4)rp++;}
  }
  var pct=(cB>0)?Math.round(rp/cB*100):0;
  if(pct>=75)oks.push("Roger : "+rp+"/"+cB+" jours Mar\u00b7Mer\u00b7Jeu ("+pct+"%) \u2713");
  else warns.push("Roger : "+rp+"/"+cB+" jours Mar\u00b7Mer\u00b7Jeu ("+pct+"%)");

  // Comptages
  if(cA===13)oks.push("Mostapha : exactement 13 jours \u2713");
  else if(cA>=12&&cA<=14)warns.push("Mostapha : "+cA+" jours (cible 13)");
  else warns.push("Mostapha : "+cA+" jours (cible 13 \u2014 ajustez par glisser-d\u00e9poser)");

  if(cB===13)oks.push("Roger : exactement 13 jours \u2713");
  else if(cB>=12&&cB<=14)warns.push("Roger : "+cB+" jours (cible 13)");
  else warns.push("Roger : "+cB+" jours (cible 13 \u2014 ajustez par glisser-d\u00e9poser)");

  oks.push("Extra : "+cX+" jours");

  // Alternance WE
  var sats2=[];for(var d=1;d<=D;d++)if(dow(year,month,d)===6)sats2.push(d);
  var weOk=true;
  for(var si=1;si<sats2.length;si++){
    var p=s[sats2[si-1]],c2=s[sats2[si]];
    if(p==="X"||c2==="X")continue;
    if(p===c2){weOk=false;break;}
  }
  if(weOk)oks.push("Alternance weekends A/B \u2713");
  else warns.push("Alternance weekends : v\u00e9rifier manuellement");

  var div=document.createElement("div");div.className="val no-print";
  errs.forEach(function(e){
    var v=document.createElement("div");v.className="vi ver";
    v.innerHTML="<span class=\"vd\">\u2717</span>"+e;div.appendChild(v);
  });
  warns.forEach(function(w){
    var v=document.createElement("div");v.className="vi vwn";
    v.innerHTML="<span class=\"vd\">\u26a0</span>"+w;div.appendChild(v);
  });
  if(!errs.length&&!warns.length){
    var v=document.createElement("div");v.className="vi vok";
    v.innerHTML="<span class=\"vd\">\u2713</span>Toutes les contraintes respect\u00e9es \u2014 planning optimal";
    div.appendChild(v);
  }
  oks.forEach(function(o){
    var v=document.createElement("div");v.className="vi vok";
    v.innerHTML="<span class=\"vd\">\u2713</span>"+o;div.appendChild(v);
  });
  return div;
}
